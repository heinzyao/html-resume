          於 2025 年專案管理大獎（PTGA）標竿專案「智能雷達防詐網 AI RADAR」中，主導開發環境建置、
          重構資料流，進行模型重新訓練與部署，將原始模型 Recall 與 Precision 提升近 2 倍。
      - title: "預測模型開發："
        desc: >
          設計分類模型預測會員升等意願，應用於精準行銷活動，達成 30% 轉換率，佔整體升等人數
          15%，績效超過傳統規則基準的兩倍以上。
      - title: "LLM 自動化流程："
        desc: >
          整合底層顧客交易資料與開源 LLM API，建立高成本效益的自動化客戶貼標系統，供業務單位
          經營參考。
      - title: "行為模式 NLP 分析："
        desc: >
          對行動銀行足跡進行資料清洗與文字處理，運用 PyTorch 與 Scikit-Learn 建置 RNN 及
          TF-IDF 模型，分析會員行為特徵。
      - title: "輿情監控自動化："
        desc: >
          設計 Google / Threads 自動搜尋爬蟲，以 Docker 容器部署至 GCP 雲端執行，提供業務單位
          持續輿情訊號。
      - title: "管理報表建置："
        desc: >
          開發會員動態追蹤 Tableau 儀表板，讓高階主管與業務單位能從多個維度即時監控 CRM 年度
          KPI。
    bullets_en:
      - title: "Generative AI Implementation: "
        desc: >
          Integrated customer transaction data with open-source LLM APIs to build a
          cost-effective automated customer-tagging pipeline, reducing manual classification
          effort and supporting downstream CRM operations.
      - title: "Predictive Modeling: "
        desc: >
          Engineered ML models to predict membership tier upgrades for targeted marketing
          campaigns, achieving a 30% conversion rate — representing 15% of total upgrades and
          more than doubling the performance of rule-based criteria.
      - title: "User Behavior Analysis: "
        desc: >
          Applied NLP (TF-IDF) and deep learning (RNN via PyTorch) to mobile banking behavioral
          footprints, uncovering usage patterns that informed product and UX decisions.
      - title: "Cloud Automation: "
        desc: >
          Architected and deployed automated public-opinion web scrapers (Google, Threads) using
          Docker containers on GCP, enabling continuous sentiment monitoring for the business units.
      - title: "Business Intelligence: "
        desc: >
          Built Tableau dashboards for dynamic membership tracking, giving executives and business
          units real-time visibility into multi-dimensional CRM KPIs and annual targets.

