summary:
  zh: >
    具備 5 年以上資料科學領域實務經驗，專精於將複雜數據轉化為可執行的商業決策。擅長使用
    Python、SQL 與 Google Cloud Platform，具備機器學習模型開發、自然語言處理、儀表板建置與
    KPI 指標定義能力。擁有在銀行業將機器學習模型、生成式 AI 工具整合至營運環境的實戰經驗，
    代表成果包括防詐 AI 模型效能提升近 2 倍（2025 PTGA 標竿專案）及行銷活動轉換率達 30%。
    取得 iPAS AI 應用規劃師中級認證。
  en: >
    Data professional with 4+ years of hands-on experience in machine learning, NLP, and
    business intelligence within the financial services sector. Proven track record of translating
    complex data into actionable insights — from building predictive ML models that doubled
    campaign conversion rates, to deploying LLM-powered automation pipelines in production.
    Combines a strong technical foundation (Python, PyTorch, SQL, Docker, GCP) with
    cross-functional communication skills honed across advertising, trade development, and
    healthtech roles.

